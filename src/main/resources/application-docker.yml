# Active with SPRING_PROFILES_ACTIVE=docker
auth:
  cors:
    # Allow browsers on the LAN (e.g. http://192.168.0.105:3000) when the UI calls :9091 directly.
    allowed-origin-patterns:
      - "http://192.168.*:*"
      - "http://10.*:*"
      - "http://172.1[6-9].*:*"
      - "http://172.2[0-9].*:*"
      - "http://172.3[0-1].*:*"
      - "http://localhost:*"
      - "http://127.0.0.1:*"
